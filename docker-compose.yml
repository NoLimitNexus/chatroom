version: '3.8'

services:
  chatroom:
    build: .
    container_name: steam_chatroom
    ports:
      - "${HOST_PORT:-3000}:3000"
    restart: unless-stopped
    environment:
      - DATA_DIR=/data
      - NODE_ENV=${NODE_ENV:-production}
    volumes:
      - chatroom_data:/data

volumes:
  chatroom_data:
