<!DOCTYPE html>
<html>
  <head>
    <title>Fog Water Machine</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a0a;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: #e5e5e5;
        }
        #canvas {
            width: 100vw !important;
            height: 100vh !important;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            /* To override Bulma styles from the original */
            display: block;
        }
        #ui-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 320px;
            background: rgba(20, 20, 20, 0.85);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            z-index: 10;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        h2 {
            margin: 0 0 15px 0;
            font-size: 1.2rem;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .control-group {
            margin-bottom: 12px;
        }
        .control-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            margin-bottom: 5px;
            color: #aaa;
        }
        input[type="range"] {
            width: 100%;
            cursor: pointer;
            accent-color: #555;
        }
        .info-text {
            font-size: 0.75rem;
            color: #777;
            margin-top: 15px;
            line-height: 1.4;
        }
        
        /* Control modes radio buttons */
        .mode-container {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            background: #222;
            padding: 5px;
            border-radius: 5px;
        }
        .mode-container label {
            font-size: 0.8rem;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 3px;
            flex: 1;
            text-align: center;
        }
        .mode-container input[type="radio"] {
            display: none;
        }
        .mode-container input[type="radio"]:checked + label {
            background: #555;
            color: #fff;
        }
    </style>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/three@v0.113.0/build/three.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/three@v0.113.0/examples/js/controls/OrbitControls.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/three@v0.113.0/examples/js/controls/TransformControls.js"></script>
  </head>

  <body>
    <canvas id="canvas"></canvas>

    <div id="ui-panel">
        <h2>Scene Controls</h2>

        <!-- Mode selection -->
        <div class="mode-container" id="interaction-modes">
            <input type="radio" id="mode-camera" name="interaction-mode" value="camera" checked>
            <label for="mode-camera">Camera</label>

            <input type="radio" id="mode-ball" name="interaction-mode" value="ball">
            <label for="mode-ball">Ball</label>

            <input type="radio" id="mode-fog" name="interaction-mode" value="fog">
            <label for="mode-fog">Fog Machine</label>
        </div>
        
        <div id="controls-container"></div>

        <div class="info-text">
            * Select interaction mode above to move camera or objects.<br>
            * Draw on water by moving objects.<br>
            * The ball and fog machine will displace the water.
        </div>
    </div>

    <script type="module" src="index.js"></script>
  </body>
</html>
