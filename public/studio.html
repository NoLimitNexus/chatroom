<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="studio.css">
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div class="sidebar glass-panel">
            <div class="header">
                <h1>STUDIO</h1>
                <p>Customize and export aesthetics.</p>
                <div class="mode-tabs" style="display: flex; gap: 10px; margin-top: 15px;">
                    <button class="mode-tab glow-btn active" data-mode="character" style="flex:1; padding: 8px; font-size: 0.8rem;">CHARACTER</button>
                    <button class="mode-tab glow-btn" data-mode="environment" style="flex:1; padding: 8px; font-size: 0.8rem;">ENVIRONMENT</button>
                </div>
            </div>
            
            <div class="section">
                <h3 id="selector-title">SELECT MODEL</h3>
                <div class="model-selector" id="model-selector">
                    <!-- Injected by JS -->
                </div>
            </div>

            <div class="section" id="controls-section">
                <h3>AESTHETICS & SHAPING</h3>
                <div id="dynamic-controls">
                    <!-- Controls injected here by JS -->
                </div>
            </div>

            <div class="section export-section">
                <button id="export-btn" class="glow-btn">EXPORT SETTINGS</button>
                <textarea id="export-output" readonly placeholder="Exported JSON will appear here..."></textarea>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.140.0/examples/js/objects/MarchingCubes.js"></script>
    
    <!-- Original Shared Characters (for base logic) -->
    <script src="https://nolimitnexus.github.io/3D-Unified-Workspace/shared-characters.js"></script>
    <script src="campfire.js"></script>
    
    <!-- Studio Logic -->
    <script src="studio.js"></script>
</body>
</html>
