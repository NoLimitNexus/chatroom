<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Chatroom - NLN</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <div id="ui-layer">
            <div id="crosshair">+</div>
            <div id="weapon-wheel">
                <div class="wheel-item" id="wheel-0" style="top: 0; left: 50%; transform: translateX(-50%);"><span class="wheel-icon">✊</span>HANDS</div>
                <div class="wheel-item" id="wheel-1" style="top: 50%; right: 0; transform: translateY(-50%);"><span class="wheel-icon">🔫</span>PISTOL</div>
                <div class="wheel-item" id="wheel-2" style="bottom: 0; left: 50%; transform: translateX(-50%);"><span class="wheel-icon">🪓</span>AXE</div>
                <div class="wheel-item" id="wheel-3" style="top: 50%; left: 0; transform: translateY(-50%);"><span class="wheel-icon">✨</span>MAGIC</div>
            </div>
            <div id="chat-box">
                <div id="chat-messages"></div>
                <div id="chat-input-container">
                    <input type="text" id="chat-input" placeholder="Type a message and press Enter..." autocomplete="off">
                </div>
            </div>
            <div id="marching-panel" style="position:absolute; top:10px; right:10px; background:rgba(0,0,0,0.6); color:white; padding:10px; border-radius:5px; font-family:sans-serif; font-size:12px; pointer-events:auto; z-index:100; display:none;">
                <label>Resolution: <span id="resVal">48</span></label><br>
                <input type="range" id="resSlider" min="16" max="64" value="48" step="4"><br>
                <label>Isolation: <span id="isoVal">80</span></label><br>
                <input type="range" id="isoSlider" min="10" max="200" value="80" step="1"><br>
            </div>
            <div id="debug-panel" style="position:absolute; top:10px; left:10px; background:rgba(0,0,0,0.6); color:white; padding:10px; border-radius:5px; font-family:sans-serif; font-size:12px; pointer-events:auto; z-index:100; display:none;">
                <label><input type="checkbox" id="toggleFBX"> Use Skeletal Animation (FBX)</label>
            </div>
            <div id="login-panel">
                <div id="login-step-1">
                    <h2>JOIN 3D CHATROOM</h2>
                    <input type="text" id="username-input" placeholder="Enter username" maxlength="16">
                    <button id="next-btn">NEXT →</button>
                </div>
                <div id="login-step-2" style="display:none;">
                    <h2>CHOOSE YOUR CHARACTER</h2>
                    <div id="char-select">
                        <div class="char-option selected" data-char="modular">
                            <div class="char-preview" id="preview-modular"></div>
                            <div class="char-name">MODULAR MAN</div>
                            <div class="char-desc">Articulated action figure with segmented limbs and a visor</div>
                        </div>
                        <div class="char-option" data-char="goop">
                            <div class="char-preview" id="preview-goop"></div>
                            <div class="char-name">THE GOOP</div>
                            <div class="char-desc">Original bouncing translucent slime creature</div>
                        </div>
                    </div>
                    <button id="join-btn">JOIN GAME</button>
                    <button id="back-btn">← BACK</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://nolimitnexus.github.io/3D-Unified-Workspace/Water.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fflate@0.8.0/umd/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/utils/SkeletonUtils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.140.0/examples/js/objects/MarchingCubes.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/objects/Sky.js"></script>
    <script src="https://nolimitnexus.github.io/3D-Unified-Workspace/shared-environment.js"></script>
    <script src="https://nolimitnexus.github.io/3D-Unified-Workspace/shared-characters.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js?v=15"></script>
</body>
</html>
